name: Release macOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, with or without a leading v
        required: true
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-version:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      has_release: ${{ steps.version.outputs.has_release }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        id: version
        run: |
          set -o pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="$(node scripts/release-tag.mjs "${{ inputs.version }}" | tail -n 1)"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="$(node scripts/release-tag.mjs "$GITHUB_REF_NAME" | tail -n 1)"
          else
            tag="$(node scripts/release-tag.mjs | tail -n 1)"
          fi

          if [ -z "$tag" ] || [ "$tag" = "No release tag needed for this commit." ]; then
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has_release=true"
            echo "tag=$tag"
            echo "version=${tag#v}"
          } >> "$GITHUB_OUTPUT"

  release-macos:
    needs: release-version
    if: needs.release-version.outputs.has_release == 'true'
    runs-on: blacksmith-12vcpu-macos-15
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install icon build tools
        run: |
          cargo install cargo-bash resvg@0.47.0 --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare macOS notarization credentials
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -z "${CSC_LINK:-}" ] || [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "Missing macOS signing secrets: CSC_LINK and CSC_KEY_PASSWORD are required."
            exit 1
          fi

          if [ -z "${APPLE_API_KEY_BASE64:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
            echo "Missing macOS notarization secrets: APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER are required."
            exit 1
          fi

          node -e "require('fs').writeFileSync(process.env.RUNNER_TEMP + '/AuthKey.p8', Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'))"
          echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build macOS assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: pnpm run package:mac

      - name: Verify macOS app signature (diagnostic)
        run: codesign --verify --deep --strict --verbose=2 release/mac-arm64/Flashtype.app

      - name: Verify macOS notarization ticket
        run: |
          xcrun stapler validate release/mac-arm64/Flashtype.app
          spctl --assess --verbose --type exec release/mac-arm64/Flashtype.app

      - name: Test packaged macOS app
        run: pnpm run test:e2e:packaged-macos

      - name: Upload packaged macOS diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-packaged-app-diagnostics
          if-no-files-found: ignore
          path: |
            release/*.dmg
            release/*.zip
            test-results
            playwright-report

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.release-version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml
