name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust wasm tools
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.108 --locked
          cargo install cargo-bash --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare macOS notarization credentials
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -z "${CSC_LINK:-}" ] || [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "Missing macOS signing secrets: CSC_LINK and CSC_KEY_PASSWORD are required."
            exit 1
          fi

          if [ -z "${APPLE_API_KEY_BASE64:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
            echo "Missing macOS notarization secrets: APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER are required."
            exit 1
          fi

          node -e "require('fs').writeFileSync(process.env.RUNNER_TEMP + '/AuthKey.p8', Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'))"
          echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build macOS assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: pnpm run package:mac

      - name: Notarize macOS DMG
        run: |
          signing_identity="$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)"
          if [ -z "$signing_identity" ]; then
            echo "No Developer ID Application identity found for signing DMG."
            exit 1
          fi

          dmg_files=(release/*.dmg)
          if [ ! -e "${dmg_files[0]}" ]; then
            echo "No DMG files found in release/."
            exit 1
          fi

          for dmg in "${dmg_files[@]}"; do
            codesign --force --timestamp --sign "$signing_identity" "$dmg"
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: Verify macOS app signature (diagnostic)
        run: codesign --verify --deep --strict --verbose=2 release/mac-arm64/Flashtype.app

      - name: Verify macOS notarization ticket
        run: |
          xcrun stapler validate release/mac-arm64/Flashtype.app
          spctl --assess --verbose --type exec release/mac-arm64/Flashtype.app
          for dmg in release/*.dmg; do
            xcrun stapler validate "$dmg"
            spctl --assess --verbose --type open --context context:primary-signature "$dmg"
          done

      - name: Test packaged macOS app
        run: pnpm run test:e2e:packaged-macos

      - name: Upload packaged macOS diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-packaged-app-diagnostics
          if-no-files-found: ignore
          path: |
            release/*.dmg
            release/*.zip
            test-results
            playwright-report

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml
