name: Release PR

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Open release PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release changes
        id: prepare
        run: |
          output="$(node scripts/prepare-release.mjs)"
          echo "$output"
          version="$(printf '%s\n' "$output" | sed -n 's/^version=//p')"
          if [ -z "$version" ]; then
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Close stale release PRs
        if: steps.prepare.outputs.has_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list \
            --state open \
            --json number,title,headRefName \
            --jq '.[] | select(.title | test("^Release v[0-9]+\\.[0-9]+\\.[0-9]+$")) | select(.headRefName != "release/next") | [.number, .headRefName] | @tsv' |
          while IFS=$'\t' read -r number branch; do
            if [ -z "$number" ]; then
              continue
            fi
            gh pr close "$number" \
              --comment "Superseded by the generated release PR on \`release/next\`." \
              --delete-branch
            echo "Closed stale release PR #$number from $branch."
          done

      - name: Create or update release PR
        if: steps.prepare.outputs.has_release == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/next
          delete-branch: true
          commit-message: Release v${{ steps.prepare.outputs.version }}
          title: Release v${{ steps.prepare.outputs.version }}
          body: |
            This PR was generated from `.changenotes/*` fragments.

            Merging this PR updates `CHANGELOG.md`, bumps the FlashType app version,
            and enables the macOS release workflow to publish `v${{ steps.prepare.outputs.version }}`.
